<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #d1ecf1 30%, #c3e6cb 70%, #f0f4f8 100%);
            overflow: hidden;
            perspective: 1200px;
        }

        /* Floating 3D background shapes */
        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 12px;
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px; height: 80px;
            background: linear-gradient(145deg, #5cb3cc, #88d4ab);
            top: 10%; left: 8%;
            transform: rotateX(45deg) rotateY(30deg);
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px; height: 120px;
            background: linear-gradient(145deg, #4a90d9, #6fc3df);
            top: 60%; right: 10%;
            transform: rotateX(-30deg) rotateY(45deg);
            animation-delay: -2s;
            border-radius: 50%;
        }

        .shape:nth-child(3) {
            width: 60px; height: 60px;
            background: linear-gradient(145deg, #88d4ab, #b8e6c8);
            bottom: 15%; left: 15%;
            transform: rotateX(60deg) rotateZ(45deg);
            animation-delay: -4s;
        }

        .shape:nth-child(4) {
            width: 100px; height: 100px;
            background: linear-gradient(145deg, #a8c4d4, #d0e8f0);
            top: 20%; right: 20%;
            transform: rotateY(50deg) rotateZ(20deg);
            animation-delay: -1s;
            border-radius: 20%;
        }

        .shape:nth-child(5) {
            width: 50px; height: 50px;
            background: linear-gradient(145deg, #3a7bd5, #5cb3cc);
            bottom: 30%; right: 30%;
            transform: rotateX(40deg) rotateY(-30deg);
            animation-delay: -3s;
        }

        .shape:nth-child(6) {
            width: 90px; height: 90px;
            background: linear-gradient(145deg, #b8e6c8, #ffffff);
            top: 50%; left: 5%;
            transform: rotateZ(30deg) rotateX(20deg);
            animation-delay: -5s;
            border-radius: 30%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(45deg) rotateY(30deg); }
            25% { transform: translateY(-20px) rotateX(50deg) rotateY(40deg); }
            50% { transform: translateY(-10px) rotateX(40deg) rotateY(35deg); }
            75% { transform: translateY(-25px) rotateX(55deg) rotateY(25deg); }
        }

        /* Main login container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
            animation: cardEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: rotateX(15deg) rotateY(-10deg) translateZ(-100px) translateY(40px);
            }
            to {
                opacity: 1;
                transform: rotateX(2deg) rotateY(0deg) translateZ(0) translateY(0);
            }
        }

        .login-card {
            width: 420px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 25px 60px rgba(74, 144, 217, 0.15),
                0 10px 30px rgba(136, 212, 171, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s ease;
        }

        .login-card:hover {
            transform: rotateX(0deg) rotateY(0deg) translateZ(10px);
            box-shadow:
                0 35px 80px rgba(74, 144, 217, 0.2),
                0 15px 40px rgba(136, 212, 171, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        /* Logo / Icon */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            transform: translateZ(30px);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #4a90d9, #88d4ab);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.3);
            transform: rotateY(-5deg);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: rotateY(10deg) scale(1.05);
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .logo-container h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        .logo-container p {
            font-size: 0.9rem;
            color: #7f8c9b;
            margin-top: 4px;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 22px;
            transform: translateZ(15px);
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #a0b4c4;
            transition: fill 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2c3e50;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #5cb3cc;
            box-shadow: 0 0 0 4px rgba(92, 179, 204, 0.15);
            background: #ffffff;
        }

        .form-group input:focus + svg,
        .form-group input:focus ~ svg {
            fill: #4a90d9;
        }

        .input-wrapper:focus-within svg {
            fill: #4a90d9;
        }

        /* Checkbox row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            transform: translateZ(10px);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #88d4ab;
            cursor: pointer;
        }

        .remember-me span {
            font-size: 0.85rem;
            color: #5a6b7a;
        }

        .forgot-link {
            font-size: 0.85rem;
            color: #4a90d9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #3a7bd5;
            text-decoration: underline;
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4a90d9, #5cb3cc, #88d4ab);
            background-size: 200% 200%;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transform: translateZ(20px);
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(74, 144, 217, 0.3);
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .login-btn:hover {
            transform: translateZ(25px) translateY(-2px);
            box-shadow: 0 10px 30px rgba(74, 144, 217, 0.4);
        }

        .login-btn:active {
            transform: translateZ(15px) translateY(1px);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            transform: translateZ(8px);
        }

        .card-footer p {
            font-size: 0.85rem;
            color: #7f8c9b;
        }

        .card-footer a {
            color: #4a90d9;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: #88d4ab;
        }

        /* 3D depth layer behind card */
        .depth-layer {
            position: absolute;
            inset: 10px;
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.1), rgba(136, 212, 171, 0.1));
            border-radius: 24px;
            transform: translateZ(-30px);
            filter: blur(2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                width: 92vw;
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-wrapper">
        <div class="depth-layer"></div>
        <div class="login-card" id="loginCard">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
                </div>
                <h1>Student Portal</h1>
                <p>Sign in to access your dashboard</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Student ID</label>
                    <div class="input-wrapper">
                        <input type="text" placeholder="Enter your student ID" required>
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="Enter your password" required>
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="card-footer">
                <p>New student? <a href="#">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        // 3D tilt effect on mouse move
        const card = document.getElementById('loginCard');
        const wrapper = document.querySelector('.login-wrapper');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / window.innerWidth;
            const y = (e.clientY - window.innerHeight / 2) / window.innerHeight;

            wrapper.style.transform = `rotateX(${-y * 6}deg) rotateY(${x * 6}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = 'rotateX(2deg) rotateY(0deg)';
        });

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.7';
            setTimeout(() => {
                btn.textContent = '✓ Welcome back!';
                btn.style.background = 'linear-gradient(135deg, #88d4ab, #5cb3cc)';
                btn.style.opacity = '1';
            }, 1500);
        }
    </script>
</body>
</html>
